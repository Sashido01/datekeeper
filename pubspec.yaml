name: datekeeper
description: Приватный офлайн-помощник для важных дат
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  intl: ^0.19.0
  uuid: ^4.5.1
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.5.1
  path: ^1.9.0                     # ✅ добавлено для работы с путями

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true