name: datekeeper
description: Приватный офлайн-помощник для важных дат
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  collection: ^1.19.0
  
  # База данных
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Безопасное хранение
  flutter_secure_storage: ^9.2.2
  
  # Управление состоянием — СТАБИЛЬНАЯ ВЕРСИЯ
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Навигация
  go_router: ^14.6.2
  
  # Настройки
  shared_preferences: ^2.5.2
  
  # Логирование
  logger: ^2.5.0
  
  # Freezed — совместимая с drift_dev версия
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Генерация кода — СОВМЕСТИМЫЕ ВЕРСИИ
  drift_dev: ^2.19.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  freezed: ^2.4.7

flutter:
  uses-material-design: true
  generate: true